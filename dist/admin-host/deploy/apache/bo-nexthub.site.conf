# Apache vhost örneği — bo-nexthub.site (backend + admin API)
# aaPanel: Website → site → Config dosyasına uyarlayın.
# api.bo-nexthub.site: AYNI DocumentRoot — ayrı 443 site açmayın (SSL AH01909).
# Cloudflare: api A kaydı proxied (turuncu bulut), SSL Flexible, aaPanel Force HTTPS KAPAT.

<VirtualHost *:80>
    ServerName bo-nexthub.site
    ServerAlias www.bo-nexthub.site api.bo-nexthub.site
    DocumentRoot /www/wwwroot/bo-nexthub.site

    <Directory /www/wwwroot/bo-nexthub.site>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /www/wwwlogs/bo-nexthub.site-error_log
    CustomLog /www/wwwlogs/bo-nexthub.site-access_log combined
</VirtualHost>
