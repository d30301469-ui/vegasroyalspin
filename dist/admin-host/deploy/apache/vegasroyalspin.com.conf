# Apache vhost örneği — vegasroyalspin.com (frontend, API-only)
# aaPanel: Website → site → Config dosyasına uyarlayın veya panel ayarlarıyla eşdeğer yapın.
# SSL: Cloudflare edge (Flexible). Origin HTTP :80 — aaPanel Let's Encrypt / Force HTTPS KAPAT.
# Bkz. deploy/aapanel/CLOUDFLARE-TR.md

<VirtualHost *:443>
    ServerName vegasroyalspin.com
    ServerAlias www.vegasroyalspin.com m.vegasroyalspin.com
    DocumentRoot /www/wwwroot/vegasroyalspin.com

    <Directory /www/wwwroot/vegasroyalspin.com>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # SSL: aaPanel Let's Encrypt ile otomatik eklenir
    # SSLEngine on
    # SSLCertificateFile ...
    # SSLCertificateKeyFile ...

    ErrorLog /www/wwwlogs/vegasroyalspin.com-error_log
    CustomLog /www/wwwlogs/vegasroyalspin.com-access_log combined
</VirtualHost>
