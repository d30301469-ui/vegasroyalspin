name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /www/wwwroot/vegasroyalspin.com
            git fetch origin main
            git reset --hard origin/main
            php tools/update_menu_bgaming_v2.php || true
            php tools/update_tabbar_v1.php || true
            php -r "if(function_exists('opcache_reset')) opcache_reset(); echo 'opcache cleared\n';"
