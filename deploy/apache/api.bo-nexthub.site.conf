# Apache — api.bo-nexthub.site (member API subdomain)
# aaPanel: bo-nexthub.site sitesine ALIAS ekleyin VEYA ayrı site aynı DocumentRoot.
#
# Önerilen: bo-nexthub.site → Domain Management → api.bo-nexthub.site alias
# DocumentRoot: /www/wwwroot/bo-nexthub.site (aynı klasör)
# SSL: Let's Encrypt — api.bo-nexthub.site dahil

<VirtualHost *:443>
    ServerName api.bo-nexthub.site
    DocumentRoot /www/wwwroot/bo-nexthub.site

    <Directory /www/wwwroot/bo-nexthub.site>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /www/wwwlogs/api.bo-nexthub.site-error_log
    CustomLog /www/wwwlogs/api.bo-nexthub.site-access_log combined
</VirtualHost>

