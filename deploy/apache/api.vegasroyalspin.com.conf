# Apache — api.vegasroyalspin.com (member API subdomain)
# aaPanel: admin.vegasroyalspin.com sitesine ALIAS ekleyin VEYA ayrı site aynı DocumentRoot.
#
# Önerilen: admin.vegasroyalspin.com → Domain Management → api.vegasroyalspin.com alias
# DocumentRoot: /www/wwwroot/admin.vegasroyalspin.com (aynı klasör)
# SSL: Let's Encrypt — api.vegasroyalspin.com dahil

<VirtualHost *:443>
    ServerName api.vegasroyalspin.com
    DocumentRoot /www/wwwroot/admin.vegasroyalspin.com

    <Directory /www/wwwroot/admin.vegasroyalspin.com>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /www/wwwlogs/api.vegasroyalspin.com-error_log
    CustomLog /www/wwwlogs/api.vegasroyalspin.com-access_log combined
</VirtualHost>

