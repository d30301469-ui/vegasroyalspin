# Apache vhost örneği — admin.vegasroyalspin.com (backend + admin API)
# aaPanel: Website → site → Config dosyasına uyarlayın.
# api.vegasroyalspin.com: AYNI DocumentRoot — ayrı 443 site açmayın (SSL AH01909).
# Cloudflare: api A kaydı proxied (turuncu bulut), SSL Flexible, aaPanel Force HTTPS KAPAT.

<VirtualHost *:80>
    ServerName admin.vegasroyalspin.com
    ServerAlias api.vegasroyalspin.com
    DocumentRoot /www/wwwroot/admin.vegasroyalspin.com

    <Directory /www/wwwroot/admin.vegasroyalspin.com>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /www/wwwlogs/admin.vegasroyalspin.com-error_log
    CustomLog /www/wwwlogs/admin.vegasroyalspin.com-access_log combined
</VirtualHost>
